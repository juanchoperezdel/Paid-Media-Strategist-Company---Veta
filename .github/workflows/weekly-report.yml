# Veta Strategist AI — Reporte Semanal Automático
# Corre cada lunes a las 8am UTC (5am Argentina)
# También se puede ejecutar manualmente desde GitHub

name: Weekly Report

on:
  schedule:
    - cron: '0 11 * * 1'  # Lunes 11:00 UTC = 8:00 AM Argentina
  workflow_dispatch:       # Permite ejecución manual desde GitHub

jobs:
  weekly-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node.js (para Meta Ads CLI)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dependencies
        run: pip install -r requirements.txt google-api-python-client google-auth-httplib2 google-ads

      - name: Install Meta CLI dependencies
        run: cd meta-ads-cli && npm ci

      - name: Write Google credentials file
        run: echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > config/google_credentials.json

      - name: Write Meta credentials
        run: echo 'META_ACCESS_TOKEN=${{ secrets.META_ACCESS_TOKEN }}' > meta-ads-cli/.env

      - name: Run weekly analysis
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_ADS_DEVELOPER_TOKEN: ${{ secrets.GOOGLE_ADS_DEVELOPER_TOKEN }}
          GOOGLE_ADS_LOGIN_CUSTOMER_ID: ${{ secrets.GOOGLE_ADS_LOGIN_CUSTOMER_ID }}
        run: python cron_weekly.py

      - name: Upload logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cron-logs-${{ github.run_number }}
          path: output/veta_cron.log
          retention-days: 30
